services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        HF_TOKEN: ${HF_TOKEN}
    image: iai-translation-backend:latest
    container_name: iai-translation-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: iai-translation-frontend:latest
    container_name: iai-translation-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
